name = "js-playground"
main = "src/index.js"
compatibility_date = "2024-05-11"
compatibility_flags = ["nodejs_compat"]

browser = { binding = "BROWSER" }

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "js-playground"

[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "js-playground"

[ai]
binding = "AI"
