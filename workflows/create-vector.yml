name: Create Vector Index

on:
  workflow_dispatch: # 允許手動從 GitHub Actions 介面觸發

jobs:
  create-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Vectorize Index
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # 這裡執行創建指令：名字叫 js-playground，維度 1024，匹配 bge-large 模型
          command: vectorize create js-playground --dimensions=1024 --metric=cosine

      - name: Confirm Status
        run: echo "Vectorize index creation command sent to Cloudflare."
