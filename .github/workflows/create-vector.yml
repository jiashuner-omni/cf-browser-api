name: Create Vector Index
on: workflow_dispatch # 這讓你可以手動點按鈕執行

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Create Index
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # 這裡的名字必須跟你的 wrangler.toml 一模一樣
          command: vectorize create js-playground --dimensions=1024 --metric=cosine
